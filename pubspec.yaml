name: pos_kasir
description: POS Kasir — Aplikasi kasir offline untuk UMKM. Gratis, tanpa subscription.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  fpdart: ^1.1.0
  go_router: ^13.2.0
  get_it: ^7.7.0

  # Database
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Security
  bcrypt: ^1.1.3
  crypto: ^3.0.3
  uuid: ^4.4.0

  # Printer (flutter_pos_printer_platform ditambah saat session 08)
  esc_pos_utils_plus: ^2.0.3
  blue_thermal_printer: ^1.1.2
  flutter_bluetooth_serial: ^0.4.0
  image: ^4.1.7

  # Scanner
  mobile_scanner: ^5.2.1
  image_picker: ^1.1.2

  # UI
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  google_fonts: ^6.2.1

  # File & Export
  archive: ^3.6.1
  share_plus: ^9.0.0
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
